<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Gradient for shield -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4F7CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5BE3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for lock -->
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8EFFF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a365d" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shield shape -->
  <path d="M50 15 
           L90 25 
           L90 55 
           C90 80, 70 95, 50 105 
           C30 95, 10 80, 10 55 
           L10 25 Z" 
        fill="url(#shieldGradient)" 
        filter="url(#shadow)"/>
  
  <!-- Shield inner border -->
  <path d="M50 22 
           L82 30 
           L82 54 
           C82 74, 66 86, 50 94 
           C34 86, 18 74, 18 54 
           L18 30 Z" 
        fill="none" 
        stroke="#6B8FFF" 
        stroke-width="1.5"
        opacity="0.5"/>
  
  <!-- Lock body -->
  <rect x="35" y="50" width="30" height="24" rx="4" ry="4" fill="url(#lockGradient)"/>
  
  <!-- Lock shackle -->
  <path d="M40 50 
           L40 42 
           C40 32, 60 32, 60 42 
           L60 50" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="5" 
        stroke-linecap="round"/>
  
  <!-- Lock keyhole -->
  <circle cx="50" cy="58" r="4" fill="#2D5BE3"/>
  <rect x="48" y="58" width="4" height="8" rx="1" fill="#2D5BE3"/>
  
  <!-- Checkmark on shield (security verified) -->
  <path d="M72 35 L76 39 L84 31" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.9"/>
  
  <!-- Text: Easy -->
  <text x="115" y="72" 
        font-family="Segoe UI, Arial, sans-serif" 
        font-size="48" 
        font-weight="300" 
        fill="#2D5BE3">Easy</text>
  
  <!-- Text: Pass -->
  <text x="222" y="72" 
        font-family="Segoe UI, Arial, sans-serif" 
        font-size="48" 
        font-weight="700" 
        fill="#1E3A8A">Pass</text>
  
  <!-- Tagline -->
  <text x="115" y="95" 
        font-family="Segoe UI, Arial, sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#64748B"
        letter-spacing="1">Safe Passwords. Simple Access.</text>
</svg>
